<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Art gallery website | VIMP</title>

  <link rel="icon" type="image/png" sizes="32x32" href="./favicon.png">
  <link rel="stylesheet" href="./styles/main.css">
</head>

<body>

  <main>
    <section class="hero" aria-labelledby="hero-title">
      <picture class="hero__illustration">
        <source media="(min-width: 1200px)"
          srcset="./assets/images/illustrations/hero-desktop.jpg 1x, ./assets/images/illustrations/hero@2x-desktop.jpg 2x">
        <source media="(min-width: 768px)"
          srcset="./assets/images/illustrations/hero-tablet.jpg 1x, ./assets/images/illustrations/hero@2x-tablet.jpg 2x">
        <img src="./assets/images/illustrations/hero-mobile.jpg"
          srcset="./assets/images/illustrations/hero@2x-mobile.jpg 2x" alt="" class="hero__image">
      </picture>

      <div class="hero__inner container">
        <div class="hero__content">
          <h1 id="hero-title" class="hero__title">Modern Art Gallery</h1>
          <p class="hero__description">
            The arts in the collection of the Modern Art Gallery all started
            from a spark of inspiration. Will these pieces inspire you? Visit
            us and find out.
          </p>
          <a href="./pages/location.html" class="button">
            <span class="button__text">Our location</span>
            <span class="button__icon" aria-hidden="true">
              <img src="./assets/images/icons/icon-arrow-right.svg" alt="">
            </span>
          </a>
        </div>
      </div>
    </section>

    <!-- Your day at the gallery
    Wander through our distinct collections and find new insights about
    our artists. Dive into the details of their creative process.
    Come &amp; be inspired
    We’re excited to welcome you to our gallery and see how our collections
    influence you.
    Modern Art Gallery
    The Modern Art Gallery is free to all visitors and open seven days a week
    from 8am to 9pm. Find us at 99 King Street, Newport, USA. -->
  </main>
</body>

</html>
